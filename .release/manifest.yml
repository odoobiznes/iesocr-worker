service: iesocr-worker
display_name: "IES-OCR worker (FastAPI, docling/tesseract/paddleocr)"
runtime: python3.12
entry: app.py
health: "http://localhost:5090/health"
http_port: 5090

build:
  command: |
    # Python — package source + freeze requirements (venv recreated on target).
    pip freeze > requirements.lock || true
    mkdir -p publish && cp -r app.py engines template_runner.py requirements.lock publish/ 2>/dev/null || true
  artifact: publish/

install_layout:
  - src: publish/
    dest: current/
    preserve_on_update: false

service:
  systemd_unit: iesocr-worker.service
  nssm_name: IesOcrWorker
  stop_timeout: 30

migrations:
  kind: none

update:
  strategy: rolling
  health_check: "curl -sf http://localhost:5090/health"
  health_timeout: 60
  rollback_on_failure: true
